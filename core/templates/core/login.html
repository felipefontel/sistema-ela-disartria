{% extends 'base.html' %}
{% load static %}

{% block main_class %}auth-container{% endblock %}

{% block content %}
<div class="glass-panel login-card">
    <img src="{% static 'core/images/APP DISARTRIA.png' %}" alt="App ELA Logo" style="max-height: 130px; max-width: 100%; height: auto; width: auto; object-fit: contain; margin-bottom: 0rem;">
    <h2 style="font-size: 1.20rem; padding-top: 30px;">Bem-vindo(a)</h2>
    <p>Entre com seu Usuário e Senha</p>

    {% if form.errors %}
        <div style="background: rgba(229, 62, 62, 0.1); border: 1px solid rgba(229, 62, 62, 0.3); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; color: #e53e3e; font-size: 0.9rem; text-align: center;">
            <i class="fa-solid fa-triangle-exclamation"></i> Usuário ou senha incorretos. Tente novamente.
        </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" name="username" id="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-primary">
            Entrar <i class="fa-solid fa-arrow-right ml-2"></i>
        </button>
    </form>
</div>
{% endblock %}
