{% extends 'base.html' %}
{% load static %}

{% block main_class %}auth-container{% endblock %}

{% block content %}
<div class="glass-panel login-card">
    <img src="{% static 'core/images/APP DISARTRIA.png' %}" alt="App ELA Logo" style="max-height: 200px; max-width: 100%; height: auto; width: auto; object-fit: contain; margin-bottom: 0rem;">
    <h2 style="font-size: 1.20rem;">Bem-vindo(a)</h2>
    <p>Entre com seu Usuário e Senha</p>

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" name="username" id="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-primary">
            Entrar <i class="fa-solid fa-arrow-right ml-2"></i>
        </button>
    </form>
</div>
{% endblock %}
